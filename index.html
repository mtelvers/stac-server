<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTessera STAC Browser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 380px; background: #f5f5f5; overflow-y: auto; border-right: 1px solid #ddd; flex-shrink: 0; }
        .map-container { flex: 1; position: relative; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
        .header { background: #2c3e50; color: white; padding: 20px; }
        .header h1 { font-size: 1.4em; margin-bottom: 5px; }
        .header p { opacity: 0.8; font-size: 0.85em; }
        .header .stac-badge { display: inline-block; background: #27ae60; color: white; padding: 2px 8px; border-radius: 3px; font-size: 0.7em; vertical-align: middle; margin-left: 8px; }
        .section { padding: 15px; border-bottom: 1px solid #ddd; }
        .section h2 { font-size: 1em; color: #2c3e50; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .controls select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 1; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: white; padding: 12px; border-radius: 4px; border: 1px solid #ddd; }
        .stat-value { font-size: 1.4em; font-weight: 600; color: #2c3e50; }
        .stat-label { font-size: 0.8em; color: #666; }
        .tile-list { max-height: 300px; overflow-y: auto; }
        .tile { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .tile:hover { border-color: #3498db; }
        .tile-name { font-weight: 600; color: #2c3e50; font-size: 0.9em; }
        .tile-meta { font-size: 0.8em; color: #666; margin-top: 3px; }
        .detail { background: white; padding: 12px; border-radius: 4px; }
        .detail-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; font-size: 0.85em; }
        .detail-label { color: #666; }
        .detail-value { font-weight: 500; }
        .asset-list { margin-top: 8px; }
        .asset { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 4px; padding: 8px; margin-bottom: 6px; }
        .asset-name { font-weight: 600; font-size: 0.85em; color: #2c3e50; }
        .asset-href { font-size: 0.75em; color: #3498db; word-break: break-all; }
        .asset-meta { font-size: 0.75em; color: #666; margin-top: 2px; }
        .loading { color: #666; font-style: italic; }
        .badge { display: inline-block; background: #3498db; color: white; padding: 2px 8px; border-radius: 3px; font-size: 0.75em; }
        .store-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7em; font-weight: 600; margin-right: 3px; }
        .store-badge.okavango { background: #d5f5e3; color: #1e8449; }
        .store-badge.s3 { background: #d6eaf8; color: #2471a3; }
        .store-badge.scaleway { background: #fdebd0; color: #ca6f1e; }
        .store-badge.default { background: #eee; color: #555; }
        .coords-overlay { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #ccc; padding: 4px 10px; border-radius: 3px; font-size: 0.75em; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>GeoTessera <span class="stac-badge">STAC</span></h1>
                <p>Global Embedding Tile Browser</p>
            </div>

            <div class="section">
                <h2>Collection</h2>
                <div class="controls">
                    <select id="collection-select"></select>
                </div>
            </div>

            <div class="section">
                <h2>Replication Health</h2>
                <div id="coverage-summary" class="stat-grid">
                    <div class="stat"><div class="stat-value">&hellip;</div><div class="stat-label">Cells with gaps</div></div>
                    <div class="stat"><div class="stat-value">&hellip;</div><div class="stat-label">Fully replicated</div></div>
                </div>
            </div>

            <div class="section">
                <h2>Coverage</h2>
                <div id="stats" class="stat-grid">
                    <div class="stat"><div class="stat-value">-</div><div class="stat-label">Tiles</div></div>
                    <div class="stat"><div class="stat-value">-</div><div class="stat-label">Stores</div></div>
                </div>
            </div>

            <div class="section">
                <h2>Items in View <span id="tile-count" class="badge">0</span></h2>
                <div id="tiles-list" class="tile-list">
                    <p class="loading">Click a tile on the map to inspect it</p>
                </div>
            </div>

            <div id="tile-detail" class="section" style="display: none;">
                <h2>Selected Item</h2>
                <div class="detail" id="detail-content"></div>
            </div>
        </div>

        <div class="map-container" id="map-container">
            <canvas id="map"></canvas>
            <div class="coords-overlay" id="coords"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <script>
        const API_URL = '/api';
        const GRID_W = 3600, GRID_H = 1800;

        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('map-container');

        /* View state: equirectangular viewport in degrees */
        let viewLon0 = -180, viewLat0 = -90, viewLonSpan = 360, viewLatSpan = 180;
        let bitmapCanvas = null; /* offscreen canvas, 3600x1800, covers -180,-90 to 180,90 */
        let bordersGeoJSON = null;
        let currentCollection = null;
        let currentYear = 2024;
        let collections = [];
        let configuredStores = [];

        /* Coordinate transforms */
        function lonToX(lon) { return (lon - viewLon0) / viewLonSpan * canvas.width; }
        function latToY(lat) { return (1 - (lat - viewLat0) / viewLatSpan) * canvas.height; }
        function xToLon(x) { return viewLon0 + (x / canvas.width) * viewLonSpan; }
        function yToLat(y) { return viewLat0 + (1 - y / canvas.height) * viewLatSpan; }

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
        }
        window.addEventListener('resize', resize);

        /* Render everything */
        function render() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            renderBitmap();
            renderBorders();
        }

        function renderBitmap() {
            if (!bitmapCanvas) return;
            /* The bitmap covers -180..180 lon, -90..90 lat (equirectangular).
               Map bitmap pixel coords to screen coords via the viewport. */
            const sx = lonToX(-180);
            const sy = latToY(90);
            const sw = lonToX(180) - sx;
            const sh = latToY(-90) - sy;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(bitmapCanvas, sx, sy, sw, sh);
        }

        function renderBorders() {
            if (!bordersGeoJSON) return;
            ctx.strokeStyle = 'rgba(180, 200, 255, 0.4)';
            ctx.lineWidth = 0.8;
            for (const feature of bordersGeoJSON.features) {
                const geom = feature.geometry;
                const rings = geom.type === 'Polygon' ? [geom.coordinates]
                    : geom.type === 'MultiPolygon' ? geom.coordinates : [];
                for (const polygon of rings) {
                    for (const ring of polygon) {
                        ctx.beginPath();
                        let penDown = false;
                        for (let i = 0; i < ring.length; i++) {
                            const x = lonToX(ring[i][0]);
                            const y = latToY(ring[i][1]);
                            /* Skip segments that wrap around the antimeridian */
                            if (i > 0 && Math.abs(ring[i][0] - ring[i-1][0]) > 90) {
                                ctx.moveTo(x, y);
                                penDown = true;
                            } else if (!penDown) {
                                ctx.moveTo(x, y);
                                penDown = true;
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.stroke();
                    }
                }
            }
        }

        /* Data loading */
        async function loadBitmap() {
            try {
                const resp = await fetch(`${API_URL}/bitmap?year=${currentYear}`);
                if (!resp.ok) return;
                const raw = new Uint8Array(await resp.arrayBuffer());
                const rowBytes = Math.ceil(GRID_W / 8);

                const offscreen = document.createElement('canvas');
                offscreen.width = GRID_W;
                offscreen.height = GRID_H;
                const octx = offscreen.getContext('2d');
                const img = octx.createImageData(GRID_W, GRID_H);
                const d = img.data;

                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        const byteIdx = y * rowBytes + (x >> 3);
                        const bit = (raw[byteIdx] >> (7 - (x & 7))) & 1;
                        if (bit) {
                            const px = (y * GRID_W + x) * 4;
                            d[px] = 39; d[px+1] = 174; d[px+2] = 96; d[px+3] = 200;
                        }
                    }
                }
                octx.putImageData(img, 0, 0);
                bitmapCanvas = offscreen;
                console.log(`bitmap: ${GRID_W}x${GRID_H}, ${raw.length} bytes`);
                render();
            } catch (e) { console.error('bitmap:', e); }
        }

        async function loadBorders() {
            try {
                const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json');
                const topo = await resp.json();
                bordersGeoJSON = topojson.feature(topo, topo.objects.countries);
                render();
            } catch (e) { console.error('borders:', e); }
        }

        async function loadReplicationHealth() {
            try {
                const resp = await fetch(`${API_URL}/coverage`);
                if (!resp.ok) return;
                const totalStores = parseInt(resp.headers.get('X-Total-Stores')) || configuredStores.length;
                const totalCells = parseInt(resp.headers.get('X-Total-Cells')) || 0;
                const anomalyCells = parseInt(resp.headers.get('X-Anomaly-Cells')) || 0;
                await resp.arrayBuffer();
                const pct = totalCells > 0 ? (100 * (totalCells - anomalyCells) / totalCells).toFixed(2) : '\u2014';
                document.getElementById('coverage-summary').innerHTML = `
                    <div class="stat">
                        <div class="stat-value" style="color:${anomalyCells > 0 ? '#e67e22' : '#27ae60'}">${anomalyCells.toLocaleString()}</div>
                        <div class="stat-label">Cells with gaps</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${pct}%</div>
                        <div class="stat-label">Fully replicated</div>
                    </div>
                `;
            } catch (e) { console.error('replication:', e); }
        }

        function storeBadge(name) {
            const cls = ['okavango','s3','scaleway'].includes(name) ? name : 'default';
            return `<span class="store-badge ${cls}">${name}</span>`;
        }
        function formatBytes(bytes) {
            if (!bytes) return '0 B';
            if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
            if (bytes > 1e6) return (bytes / 1e6).toFixed(1) + ' MB';
            if (bytes > 1e3) return (bytes / 1e3).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        async function loadCollections() {
            try {
                const response = await fetch(`${API_URL}/collections`);
                const data = await response.json();
                collections = data.collections;
                const select = document.getElementById('collection-select');
                select.innerHTML = collections.map(c =>
                    `<option value="${c.id}" ${c.id === 'geotessera-2024' ? 'selected' : ''}>${c.title} (${c.summaries.tile_count.toLocaleString()} tiles)</option>`
                ).join('');
                select.onchange = () => {
                    currentCollection = select.value;
                    currentYear = parseInt(currentCollection.split('-').pop());
                    refreshConfiguredStores();
                    loadStats();
                    loadBitmap();
                };
                currentCollection = select.value || collections[0]?.id;
                currentYear = parseInt(currentCollection.split('-').pop());
                refreshConfiguredStores();
                loadStats();
                loadReplicationHealth();
                loadBitmap();
            } catch (e) { console.error('collections:', e); }
        }

        function refreshConfiguredStores() {
            const c = collections.find(c => c.id === currentCollection);
            configuredStores = (c && c.summaries && Array.isArray(c.summaries.stores))
                ? c.summaries.stores : [];
        }

        function loadStats() {
            const c = collections.find(c => c.id === currentCollection);
            if (!c) return;
            const storesHtml = configuredStores.length > 0
                ? configuredStores.map(storeBadge).join('') : '<span style="color:#999;font-size:0.8em">none</span>';
            document.getElementById('stats').innerHTML = `
                <div class="stat">
                    <div class="stat-value">${c.summaries.tile_count.toLocaleString()}</div>
                    <div class="stat-label">Tiles in ${currentYear}</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${configuredStores.length}</div>
                    <div class="stat-label">Stores</div>
                </div>
                <div class="stat" style="grid-column: 1 / -1;">
                    <div class="stat-label" style="margin-bottom:4px">Configured stores</div>
                    <div>${storesHtml}</div>
                </div>
            `;
        }

        async function loadItemsForBbox(minLon, minLat, maxLon, maxLat) {
            try {
                const bbox = `${minLon},${minLat},${maxLon},${maxLat}`;
                const resp = await fetch(`${API_URL}/search?bbox=${bbox}&year=${currentYear}&limit=4000`);
                const data = await resp.json();
                const totalStores = configuredStores.length;
                const tilesHtml = [];

                for (const feature of data.features) {
                    const assetKeys = Object.keys(feature.assets || {});
                    const presentStores = configuredStores.filter(s => assetKeys.includes(s));
                    const missingStores = configuredStores.filter(s => !assetKeys.includes(s));
                    const stores = presentStores.map(storeBadge).join('');
                    const missing = missingStores.map(s =>
                        `<span class="store-badge ${['okavango','s3','scaleway'].includes(s) ? s : 'default'}" style="opacity:0.35;text-decoration:line-through">${s}</span>`
                    ).join('');
                    tilesHtml.push(`
                        <div class="tile" onclick="selectItemById('${feature.id}')">
                            <div class="tile-name">${feature.id}</div>
                            <div class="tile-meta">
                                <span style="font-weight:600;color:#2c3e50">${presentStores.length}/${totalStores}</span>
                                ${formatBytes(feature.properties.file_size)}
                                ${stores}${missing}
                            </div>
                        </div>
                    `);
                }

                document.getElementById('tile-count').textContent = data.numberReturned;
                document.getElementById('tiles-list').innerHTML = tilesHtml.length > 0
                    ? tilesHtml.slice(0, 100).join('') + (tilesHtml.length > 100 ? '<p class="loading">... and more</p>' : '')
                    : '<p class="loading">No items in selection</p>';

                /* Store for detail clicks */
                window._lastItems = data.features;
            } catch (e) {
                console.error('items:', e);
                document.getElementById('tiles-list').innerHTML = '<p class="loading">Error loading items</p>';
            }
        }

        function selectItem(feature) {
            const detail = document.getElementById('tile-detail');
            detail.style.display = 'block';
            const props = feature.properties;
            const assets = feature.assets;
            const assetKeys = Object.keys(assets);
            let assetsHtml = '';
            if (assetKeys.length > 0) {
                assetsHtml = '<div class="asset-list"><strong style="font-size:0.85em">Assets:</strong>';
                for (const key of assetKeys) {
                    const a = assets[key];
                    assetsHtml += `
                        <div class="asset">
                            <div class="asset-name">${storeBadge(key)} ${a.title || key}</div>
                            <div class="asset-href"><a href="${a.href}" target="_blank">${a.href}</a></div>
                            <div class="asset-meta">
                                ${a['file:size'] ? formatBytes(a['file:size']) : ''}
                                ${a['file:checksum'] ? ' &middot; ' + a['file:checksum'].substring(0, 20) + '...' : ''}
                            </div>
                        </div>`;
                }
                assetsHtml += '</div>';
            } else {
                assetsHtml = '<p style="color:#999;font-size:0.85em">No assets registered</p>';
            }
            document.getElementById('detail-content').innerHTML = `
                <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value">${feature.id}</span></div>
                <div class="detail-row"><span class="detail-label">Collection</span><span class="detail-value">${feature.collection}</span></div>
                <div class="detail-row"><span class="detail-label">Bbox</span><span class="detail-value">${feature.bbox.map(v => v.toFixed(2)).join(', ')}</span></div>
                <div class="detail-row"><span class="detail-label">File Size</span><span class="detail-value">${formatBytes(props.file_size)}</span></div>
                <div class="detail-row"><span class="detail-label">Scales Size</span><span class="detail-value">${formatBytes(props.scales_size)}</span></div>
                ${assetsHtml}
                <div style="margin-top:8px;font-size:0.75em">
                    <a href="${API_URL}/collections/${feature.collection}/items/${feature.id}" target="_blank">View STAC JSON</a>
                </div>
            `;
        }

        window.selectItemById = function(id) {
            const items = window._lastItems || [];
            const f = items.find(i => i.id === id);
            if (f) selectItem(f);
        };

        let refreshTimeout = null;
        function refreshVisibleItems() {
            clearTimeout(refreshTimeout);
            refreshTimeout = setTimeout(() => {
                /* Only auto-load when zoomed in enough (< 30 degrees span) */
                if (viewLonSpan < 30 && viewLatSpan < 30) {
                    loadItemsForBbox(viewLon0, viewLat0, viewLon0 + viewLonSpan, viewLat0 + viewLatSpan);
                } else {
                    document.getElementById('tiles-list').innerHTML = '<p class="loading">Zoom in to see tile list</p>';
                    document.getElementById('tile-count').textContent = '-';
                }
            }, 400);
        }

        /* Mouse interaction: drag to pan, click to inspect tile, wheel to zoom, dblclick to reset */
        let dragStart = null;
        let dragViewLon0 = 0, dragViewLat0 = 0;
        let didDrag = false;

        canvas.addEventListener('mousedown', e => {
            dragStart = { x: e.offsetX, y: e.offsetY };
            dragViewLon0 = viewLon0;
            dragViewLat0 = viewLat0;
            didDrag = false;
            canvas.style.cursor = 'grabbing';
        });
        canvas.addEventListener('mousemove', e => {
            const lon = xToLon(e.offsetX).toFixed(2);
            const lat = yToLat(e.offsetY).toFixed(2);
            document.getElementById('coords').textContent = `${lat}\u00b0, ${lon}\u00b0`;
            if (dragStart) {
                const dx = e.offsetX - dragStart.x;
                const dy = e.offsetY - dragStart.y;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
                const lonPerPx = viewLonSpan / canvas.width;
                const latPerPx = viewLatSpan / canvas.height;
                viewLon0 = dragViewLon0 - dx * lonPerPx;
                viewLat0 = dragViewLat0 + dy * latPerPx;
                /* Clamp */
                viewLon0 = Math.max(-180, Math.min(180 - viewLonSpan, viewLon0));
                viewLat0 = Math.max(-90, Math.min(90 - viewLatSpan, viewLat0));
                render();
            }
        });
        canvas.addEventListener('mouseup', e => {
            canvas.style.cursor = 'crosshair';
            if (!dragStart) return;
            dragStart = null;
            if (didDrag) { refreshVisibleItems(); return; }

            /* Click (no drag): fetch the tile at this location */
            const clickLon = xToLon(e.offsetX);
            const clickLat = yToLat(e.offsetY);
            /* Snap to tile grid: centres are at *.X5 */
            const tileLon = (Math.floor(clickLon / 0.1) * 0.1 + 0.05).toFixed(2);
            const tileLat = (Math.floor(clickLat / 0.1) * 0.1 + 0.05).toFixed(2);
            const tileId = `${currentYear}_grid_${tileLon}_${tileLat}`;

            fetch(`${API_URL}/collections/geotessera-${currentYear}/items/${tileId}`)
                .then(r => { if (r.ok) return r.json(); throw new Error('not found'); })
                .then(feature => {
                    selectItem(feature);
                    window._lastItems = [feature];
                    document.getElementById('tile-count').textContent = '1';
                    document.getElementById('tiles-list').innerHTML = `
                        <div class="tile" onclick="selectItemById('${feature.id}')">
                            <div class="tile-name">${feature.id}</div>
                            <div class="tile-meta">${formatBytes(feature.properties.file_size)}</div>
                        </div>`;
                })
                .catch(() => {
                    document.getElementById('tiles-list').innerHTML =
                        `<p class="loading">No tile at ${tileLat}\u00b0, ${tileLon}\u00b0</p>`;
                    document.getElementById('tile-detail').style.display = 'none';
                });
        });
        canvas.addEventListener('mouseleave', () => {
            dragStart = null;
            canvas.style.cursor = 'crosshair';
        });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const factor = e.deltaY > 0 ? 1.3 : 0.77;
            const mouseLon = xToLon(e.offsetX);
            const mouseLat = yToLat(e.offsetY);
            const newLonSpan = Math.min(360, viewLonSpan * factor);
            const newLatSpan = Math.min(180, viewLatSpan * factor);
            viewLon0 = mouseLon - (mouseLon - viewLon0) / viewLonSpan * newLonSpan;
            viewLat0 = mouseLat - (mouseLat - viewLat0) / viewLatSpan * newLatSpan;
            viewLonSpan = newLonSpan;
            viewLatSpan = newLatSpan;
            viewLon0 = Math.max(-180, Math.min(180 - viewLonSpan, viewLon0));
            viewLat0 = Math.max(-90, Math.min(90 - viewLatSpan, viewLat0));
            render();
            refreshVisibleItems();
        }, { passive: false });
        canvas.addEventListener('dblclick', () => {
            viewLon0 = -180; viewLat0 = -90; viewLonSpan = 360; viewLatSpan = 180;
            document.getElementById('tiles-list').innerHTML = '<p class="loading">Click a tile on the map to inspect it</p>';
            document.getElementById('tile-count').textContent = '0';
            document.getElementById('tile-detail').style.display = 'none';
            render();
        });

        /* Init */
        resize();
        loadBorders();
        loadCollections();
    </script>
</body>
</html>
